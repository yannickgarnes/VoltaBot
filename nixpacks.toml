[phases.setup]
nixPkgs = ["chromium", "chromedriver", "python311"]

[phases.build]
cmds = ["pip install -r requirements.txt"]

[start]
# Localizamos el binario de Nix y creamos un link en una ruta estándar
cmd = "ln -sf $(which chromium) /usr/bin/chromium && export CHROME_BIN=/usr/bin/chromium && python bot.py"
